# Alert rules for the bridged master cluster (10.10.0.100). The stock
# sgpu-alerts.yml only matches local sgpu_* series; the bridge republishes
# that cluster under master_sgpu_*, which no other rule watches.
# Install: sudo cp prometheus/sgpu-master-cluster-alerts.yml /etc/prometheus/rules/
#          sudo systemctl reload prometheus
groups:
  - name: sgpu-master-cluster
    rules:
      - alert: MasterBridgeDown
        expr: master_sgpu_bridge_up == 0 or absent(master_sgpu_bridge_up)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: master-cluster bridge is not delivering data
          description: >-
            sgpu-remote-bridge has not fetched metrics from 10.10.0.100 for
            5 minutes — the master dashboards are blind. Check the
            sgpu-master-bridge user timer and ssh connectivity to
            sim@10.10.0.100.

      - alert: MasterClusterCollectorStale
        expr: time() - master_sgpu_collector_last_success_timestamp_seconds > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: master cluster's sgpu collector is stale
          description: >-
            The bridge is running but the collector on 10.10.0.100 has not
            published a successful snapshot for 5 minutes. Check
            sgpu-collector on that host.

      - alert: MasterClusterNodeDown
        expr: master_sgpu_node_up == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "master cluster node {{ $labels.node }} is not reporting"
          description: >-
            Node {{ $labels.node }} on 10.10.0.100 has had no sgpu data for
            10 minutes (down, drained, or agent dead).
