name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e . pytest
      - name: Test
        run: uv run --no-sync pytest tests/ -v
